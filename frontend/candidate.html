<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APTSO - Candidate Job Portal</title>
    <!-- Tailwind and Outfit Google Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 12s linear infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #030712; /* slate-950 */
            color: #f3f4f6; /* grey-100 */
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1f2937;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #374151;
        }
        /* Glassmorphism utility */
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-panel {
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-accent {
            box-shadow: 0 0 40px -10px rgba(99, 102, 241, 0.15);
        }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen relative antialiased selection:bg-indigo-500 selection:text-white">
    
    <!-- Ambient Blur Background Elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-indigo-600/5 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-600/5 blur-[120px] pointer-events-none"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const API_URL = "http://127.0.0.1:8000";

        // --- DYNAMIC API LAYER WITH AUTO-LOGIN ---
        const api = {
            login: async () => {
                const formData = new FormData();
                formData.append("username", "candidate");
                formData.append("password", "password");
                const response = await fetch(`${API_URL}/token`, {
                    method: "POST",
                    body: formData,
                });
                if (!response.ok) throw new Error("Authentication failed");
                const data = await response.json();
                localStorage.setItem("candidate_token", data.access_token);
                return data.access_token;
            },

            getToken: async () => {
                let token = localStorage.getItem("candidate_token");
                if (!token) {
                    token = await api.login();
                }
                return token;
            },

            getCandidateJobs: async (searchTerm = '', region = '') => {
                let url = `${API_URL}/jobs/?limit=100`;
                if (searchTerm) {
                    url += `&search=${encodeURIComponent(searchTerm)}`;
                }
                if (region) {
                    url += `&region=${encodeURIComponent(region)}`;
                }
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch jobs from backend");
                return response.json();
            },

            starJob: async (jobId) => {
                let token = await api.getToken();
                const makeRequest = async (authTok) => {
                    return fetch(`${API_URL}/candidate/starred-jobs`, {
                        method: 'POST',
                        body: JSON.stringify({ job_id: jobId }),
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${authTok}`
                        }
                    });
                };
                
                let res = await makeRequest(token);
                if (res.status === 401) { // Token might be expired, try logging in again
                    const freshToken = await api.login();
                    res = await makeRequest(freshToken);
                }
                if (!res.ok) throw new Error("Failed to star job");
                return res.json();
            },

            unstarJob: async (jobId) => {
                let token = await api.getToken();
                const makeRequest = async (authTok) => {
                    return fetch(`${API_URL}/candidate/starred-jobs/${jobId}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${authTok}` }
                    });
                };

                let res = await makeRequest(token);
                if (res.status === 401) {
                    const freshToken = await api.login();
                    res = await makeRequest(freshToken);
                }
                if (!res.ok && res.status !== 204) throw new Error("Failed to unstar job");
                return { status: 'ok' };
            },

            getCandidateStarredJobs: async () => {
                let token = await api.getToken();
                const makeRequest = async (authTok) => {
                    return fetch(`${API_URL}/candidate/starred-jobs`, {
                        headers: { 'Authorization': `Bearer ${authTok}` }
                    });
                };

                let res = await makeRequest(token);
                if (res.status === 401) {
                    const freshToken = await api.login();
                    res = await makeRequest(freshToken);
                }
                if (!res.ok) throw new Error("Failed to fetch starred jobs");
                return res.json();
            }
        };

        // --- ICONS (Lucide styled SVG wrappers) ---
        const SearchIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        );

        const MapPinIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-indigo-400 mr-1.5 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        );

        const DollarIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-emerald-400 mr-1.5 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17  5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        );

        const CalendarIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-violet-400 mr-1.5 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        );

        const BriefcaseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-indigo-500 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
        );

        const StarIcon = ({ filled }) => (
            <svg xmlns="http://www.w3.org/2000/svg" className={`h-6 w-6 transition-all duration-300 ${filled ? 'text-amber-400 fill-amber-400 scale-110 drop-shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'text-slate-400 hover:text-amber-400 hover:scale-115'}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        );

        const CloseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-slate-400 hover:text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );

        const GlobIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-cyan-400 mr-1.5 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
        );

        // --- SKELETON LOADER FOR GRID ---
        function SkeletonGrid() {
            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-pulse-slow">
                    {[1, 2, 3, 4, 5, 6].map((i) => (
                        <div key={i} className="glass-card rounded-2xl p-6 h-[260px] flex flex-col justify-between border border-slate-800/80">
                            <div>
                                <div className="h-6 w-3/4 bg-slate-800 rounded-lg mb-3"></div>
                                <div className="h-4 w-1/2 bg-slate-800/70 rounded-lg mb-2"></div>
                                <div className="h-3 w-1/3 bg-slate-800/40 rounded-lg mb-4"></div>
                                <div className="h-10 w-full bg-slate-800/20 rounded-xl mb-3"></div>
                            </div>
                            <div className="flex gap-2">
                                <div className="h-4 w-20 bg-slate-800/60 rounded-full"></div>
                                <div className="h-4 w-24 bg-slate-800/60 rounded-full"></div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        // --- DYNAMIC SIDE DRAWER ---
        function JobDetailDrawer({ job, onClose, isStarred, onStar, onUnstar }) {
            const [copied, setCopied] = useState(false);

            if (!job) return null;

            const handleShare = () => {
                navigator.clipboard.writeText(job.url);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const sourceGradients = {
                "Remotive": "from-rose-500/20 to-orange-500/20 text-orange-400 border-orange-500/30",
                "Adzuna": "from-cyan-500/20 to-blue-500/20 text-cyan-400 border-cyan-500/30",
                "JSearch": "from-emerald-500/20 to-teal-500/20 text-emerald-400 border-emerald-500/30",
                "jsearch": "from-emerald-500/20 to-teal-500/20 text-emerald-400 border-emerald-500/30",
                "adzuna": "from-cyan-500/20 to-blue-500/20 text-cyan-400 border-cyan-500/30"
            };

            const cleanSource = job.source || "Aggregator";

            return (
                <div className="fixed inset-0 z-50 flex justify-end" style={{ backgroundColor: 'rgba(2, 6, 23, 0.65)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
                    <div 
                        className="w-full max-w-xl h-full glass-panel shadow-2xl flex flex-col relative animate-slide-in overflow-y-auto"
                        onClick={(e) => e.stopPropagation()}
                    >
                        {/* Drawer Header */}
                        <div className="p-6 border-b border-slate-800/80 flex justify-between items-start">
                            <div>
                                <span className={`inline-block text-xs font-semibold px-3 py-1 rounded-full border bg-gradient-to-r ${sourceGradients[cleanSource] || 'from-indigo-500/20 to-violet-500/20 text-indigo-400 border-indigo-500/30'} mb-3`}>
                                    {cleanSource.toUpperCase()}
                                </span>
                                <h2 className="text-2xl font-bold text-white leading-tight">{job.title}</h2>
                                <p className="text-lg text-indigo-300 font-medium mt-1">{job.company}</p>
                            </div>
                            <button onClick={onClose} className="p-2 bg-slate-900/80 border border-slate-800 rounded-xl hover:bg-slate-800 hover:border-slate-700 transition-colors">
                                <CloseIcon />
                            </button>
                        </div>

                        {/* Drawer Content */}
                        <div className="p-6 space-y-6 flex-grow">
                            {/* Key Stats Grid */}
                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-4 bg-slate-950/60 border border-slate-800/50 rounded-2xl flex items-center">
                                    <div className="p-2.5 bg-indigo-500/10 rounded-xl mr-3 border border-indigo-500/20">
                                        <MapPinIcon />
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-500">Location</p>
                                        <p className="text-sm font-semibold text-slate-200">{job.location}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-950/60 border border-slate-800/50 rounded-2xl flex items-center">
                                    <div className="p-2.5 bg-emerald-500/10 rounded-xl mr-3 border border-emerald-500/20">
                                        <DollarIcon />
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-500">Salary</p>
                                        <p className="text-sm font-semibold text-emerald-400">{job.salary || "Not Specified"}</p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-950/60 border border-slate-800/50 rounded-2xl flex items-center">
                                    <div className="p-2.5 bg-violet-500/10 rounded-xl mr-3 border border-violet-500/20">
                                        <CalendarIcon />
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-500">Posted Date</p>
                                        <p className="text-sm font-semibold text-slate-200">
                                            {new Date(job.posted_date).toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'})}
                                        </p>
                                    </div>
                                </div>
                                <div className="p-4 bg-slate-950/60 border border-slate-800/50 rounded-2xl flex items-center">
                                    <div className="p-2.5 bg-cyan-500/10 rounded-xl mr-3 border border-cyan-500/20">
                                        <GlobIcon />
                                    </div>
                                    <div>
                                        <p className="text-xs text-slate-500">Region</p>
                                        <p className="text-sm font-semibold text-cyan-400">{job.region || "Global"}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Job Description */}
                            <div className="space-y-3">
                                <h3 className="text-lg font-bold text-white border-l-4 border-indigo-500 pl-2">Job Description</h3>
                                <div className="text-slate-300 leading-relaxed text-sm bg-slate-950/40 p-5 rounded-2xl border border-slate-800/40 max-h-[300px] overflow-y-auto whitespace-pre-line">
                                    {job.description || "No full job description provided by the source. Please check the posting page."}
                                </div>
                            </div>
                        </div>

                        {/* Drawer Actions */}
                        <div className="p-6 border-t border-slate-800/80 bg-slate-950/90 flex gap-3 sticky bottom-0">
                            <button 
                                onClick={() => isStarred ? onUnstar(job._id) : onStar(job._id)} 
                                className="px-4 py-3.5 bg-slate-900 border border-slate-800 rounded-xl hover:bg-slate-800 hover:border-slate-700 transition-colors flex items-center justify-center"
                            >
                                <StarIcon filled={isStarred} />
                            </button>
                            
                            <button 
                                onClick={handleShare} 
                                className="flex-1 px-4 py-3.5 bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-300 font-semibold rounded-xl transition-all duration-300"
                            >
                                {copied ? "✓ Copied!" : "🔗 Share Link"}
                            </button>

                            <a 
                                href={job.url} 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="flex-[2] px-6 py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white font-bold rounded-xl transition-all duration-300 text-center shadow-lg shadow-indigo-500/20"
                            >
                                Apply Externally →
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        // --- TOAST NOTIFICATIONS ---
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColors = {
                success: "bg-emerald-950/90 text-emerald-300 border-emerald-500/40",
                error: "bg-rose-950/90 text-rose-300 border-rose-500/40",
                info: "bg-indigo-950/90 text-indigo-300 border-indigo-500/40"
            };

            return (
                <div className={`fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl border flex items-center shadow-2xl backdrop-blur-md animate-fade-in ${bgColors[type] || bgColors.info}`}>
                    <span className="font-medium text-sm">{message}</span>
                </div>
            );
        }

        // --- DASHBOARD CORE ---
        function CandidateDashboard() {
            const [view, setView] = useState('all'); // 'all' or 'starred'
            const [jobs, setJobs] = useState([]);
            const [starredJobs, setStarredJobs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const [regionFilter, setRegionFilter] = useState(""); // empty string means "All"
            const [selectedJob, setSelectedJob] = useState(null);
            const [toast, setToast] = useState(null);
            const [secureSession, setSecureSession] = useState(false);

            const showToast = useCallback((message, type = 'info') => {
                setToast({ message, type });
            }, []);

            const fetchData = async (term = searchTerm, reg = regionFilter) => {
                setLoading(true);
                try {
                    const jobsData = await api.getCandidateJobs(term, reg);
                    setJobs(jobsData);
                    setSecureSession(true);
                } catch (error) {
                    console.error("Failed to fetch candidate jobs", error);
                    showToast("Failed to connect to backend server. Make sure it's running.", "error");
                    setSecureSession(false);
                } finally {
                    setLoading(false);
                }
            };

            const fetchStarred = async () => {
                try {
                    const starredData = await api.getCandidateStarredJobs();
                    setStarredJobs(starredData);
                } catch (error) {
                    console.error("Failed to fetch starred jobs", error);
                    showToast("Could not load starred jobs. Check connection.", "error");
                }
            };

            // Initial Mount Data Load
            useEffect(() => {
                const init = async () => {
                    try {
                        await api.getToken(); // Auto-login
                        setSecureSession(true);
                        await fetchData("", "");
                        await fetchStarred();
                    } catch (e) {
                        console.error("Auth / Data Fetch error:", e);
                        showToast("Auto-connection failed. Backend server might be offline.", "error");
                    }
                };
                init();
            }, []);

            // Star/Unstar Handler
            const handleStarToggle = async (job, e) => {
                if (e) e.stopPropagation();
                const isStarred = starredJobs.some(j => j._id === job._id);
                try {
                    if (isStarred) {
                        await api.unstarJob(job._id);
                        setStarredJobs(prev => prev.filter(j => j._id !== job._id));
                        showToast("Job removed from Stars", "info");
                    } else {
                        await api.starJob(job._id);
                        setStarredJobs(prev => [...prev, job]);
                        showToast("Job added to Stars successfully!", "success");
                    }
                } catch (err) {
                    console.error("Star toggle error:", err);
                    showToast("Authentication/Connection failed. Try again.", "error");
                }
            };

            const handleSearchSubmit = (e) => {
                if (e) e.preventDefault();
                fetchData(searchTerm, regionFilter);
            };

            const handleRegionChange = (reg) => {
                setRegionFilter(reg);
                fetchData(searchTerm, reg);
            };

            const starredJobIds = new Set(starredJobs.map(j => j._id));
            const jobsToDisplay = view === 'all' ? jobs : starredJobs;

            const sourceColors = {
                "Remotive": "bg-orange-500/10 text-orange-400 border-orange-500/20",
                "Adzuna": "bg-cyan-500/10 text-cyan-400 border-cyan-500/20",
                "JSearch": "bg-emerald-500/10 text-emerald-400 border-emerald-500/20",
                "jsearch": "bg-emerald-500/10 text-emerald-400 border-emerald-500/20",
                "adzuna": "bg-cyan-500/10 text-cyan-400 border-cyan-500/20"
            };

            return (
                <div className="space-y-8 max-w-7xl mx-auto">
                    
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    {/* Header Panel */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-slate-900/30 p-6 rounded-3xl border border-slate-800/40">
                        <div>
                            <div className="flex items-center gap-3">
                                <h1 className="text-3xl font-extrabold text-white tracking-tight">Explore Opportunities</h1>
                                {secureSession ? (
                                    <span className="flex h-2.5 w-2.5 relative">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500" title="Connected to Secure Backend"></span>
                                    </span>
                                ) : (
                                    <span className="flex h-2.5 w-2.5 relative">
                                        <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500" title="Disconnected"></span>
                                    </span>
                                )}
                            </div>
                            <p className="text-slate-400 text-sm mt-1">Aggregated jobs from Remotive, JSearch, and Adzuna.</p>
                        </div>

                        {/* Tabs Toggle */}
                        <div className="flex bg-slate-950 p-1.5 rounded-2xl border border-slate-800">
                            <button 
                                onClick={() => setView('all')}
                                className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 ${view === 'all' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/10' : 'text-slate-400 hover:text-white'}`}
                            >
                                Browse Jobs ({jobs.length})
                            </button>
                            <button 
                                onClick={() => setView('starred')}
                                className={`px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 ${view === 'starred' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/10' : 'text-slate-400 hover:text-white'}`}
                            >
                                Starred ({starredJobs.length})
                            </button>
                        </div>
                    </div>

                    {/* Filter and Search Panel (only in Browse View) */}
                    {view === 'all' && (
                        <form onSubmit={handleSearchSubmit} className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-900/40 p-5 rounded-2xl border border-slate-800/40">
                            <div className="md:col-span-2 relative">
                                <input 
                                    type="text" 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    placeholder="Search by job title, company or keyword..." 
                                    className="w-full bg-slate-950 border border-slate-800 hover:border-slate-700 text-slate-200 placeholder-slate-500 px-4 py-3.5 pl-11 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-sm"
                                />
                                <div className="absolute left-4 top-4">
                                    <SearchIcon />
                                </div>
                            </div>
                            
                            {/* Region dropdown */}
                            <div>
                                <select 
                                    value={regionFilter}
                                    onChange={(e) => handleRegionChange(e.target.value)}
                                    className="w-full bg-slate-950 border border-slate-800 hover:border-slate-700 text-slate-300 px-4 py-3.5 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all text-sm"
                                >
                                    <option value="">All Regions</option>
                                    <option value="Thrissur">Thrissur</option>
                                    <option value="KOCHI">Kochi</option>
                                    <option value="Bangalore">Bangalore</option>
                                </select>
                            </div>

                            <div>
                                <button 
                                    type="submit"
                                    className="w-full h-full py-3.5 bg-slate-900 border border-slate-800 text-slate-100 font-semibold rounded-xl hover:bg-indigo-600 hover:text-white hover:border-indigo-500 transition-all duration-300 text-sm shadow-md"
                                >
                                    Search Jobs
                                </button>
                            </div>
                        </form>
                    )}

                    {/* Jobs List Grid */}
                    {loading ? (
                        <SkeletonGrid />
                    ) : (
                        jobsToDisplay.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {jobsToDisplay.map((job) => {
                                    const cleanSource = job.source || "Aggregator";
                                    return (
                                        <div 
                                            key={job._id}
                                            onClick={() => setSelectedJob(job)}
                                            className="glass-card rounded-2xl p-6 flex flex-col justify-between cursor-pointer border border-slate-800/80 hover:border-indigo-500/40 hover:-translate-y-1 hover:shadow-2xl transition-all duration-300 relative group glow-accent"
                                        >
                                            {/* Star Absolute Button */}
                                            <button 
                                                onClick={(e) => handleStarToggle(job, e)}
                                                className="absolute right-5 top-5 p-2 bg-slate-950/80 border border-slate-850 rounded-xl hover:bg-slate-900 transition-colors z-10"
                                            >
                                                <StarIcon filled={starredJobIds.has(job._id)} />
                                            </button>

                                            <div>
                                                {/* Header & Source Tag */}
                                                <div className="mb-4">
                                                    <span className={`inline-block text-[10px] font-bold px-2 py-0.5 rounded-full border ${sourceColors[cleanSource] || 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20'} tracking-wider uppercase mb-2`}>
                                                        {cleanSource}
                                                    </span>
                                                    <h3 className="text-lg font-bold text-white group-hover:text-indigo-400 transition-colors leading-snug line-clamp-1 pr-6" title={job.title}>
                                                        {job.title}
                                                    </h3>
                                                    <p className="text-indigo-300 font-medium text-sm mt-0.5">{job.company}</p>
                                                </div>

                                                {/* Meta Info */}
                                                <div className="space-y-1.5 mb-4 text-xs text-slate-400">
                                                    <div>
                                                        <MapPinIcon />
                                                        <span>{job.location}</span>
                                                    </div>
                                                    <div>
                                                        <DollarIcon />
                                                        <span className="text-emerald-400 font-medium">{job.salary || "Not specified"}</span>
                                                    </div>
                                                </div>

                                                {/* Brief Preview */}
                                                <p className="text-slate-400 text-xs leading-relaxed line-clamp-3 mb-5">
                                                    {job.description ? job.description.replace(/<[^>]*>/g, '') : "No description provided. Click to view posting page."}
                                                </p>
                                            </div>

                                            {/* Date and View Footer */}
                                            <div className="flex justify-between items-center pt-4 border-t border-slate-800/40 text-[10px] text-slate-500">
                                                <div className="flex items-center">
                                                    <CalendarIcon />
                                                    <span>
                                                        {new Date(job.posted_date).toLocaleDateString(undefined, {month: 'short', day: 'numeric'})}
                                                    </span>
                                                </div>
                                                <span className="text-indigo-400 group-hover:underline font-semibold tracking-wider uppercase text-[9px]">
                                                    Read Details →
                                                </span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="glass-card p-12 rounded-3xl text-center border border-slate-800/50 max-w-lg mx-auto space-y-4">
                                <div className="p-4 bg-slate-900/80 border border-slate-800 rounded-full w-fit mx-auto">
                                    <BriefcaseIcon />
                                </div>
                                <h3 className="text-xl font-bold text-white">No jobs found</h3>
                                <p className="text-slate-400 text-sm max-w-sm mx-auto">
                                    {view === 'all' 
                                        ? "We couldn't find any opportunities matching your criteria. Try adjusting your search keywords or region filter." 
                                        : "You haven't starred any opportunities yet. Switch back to 'Browse Jobs' and star some listings to keep track of them!"}
                                </p>
                            </div>
                        )
                    )}

                    {/* Job Details Sidebar Drawer */}
                    {selectedJob && (
                        <JobDetailDrawer 
                            job={selectedJob} 
                            onClose={() => setSelectedJob(null)} 
                            isStarred={starredJobIds.has(selectedJob._id)}
                            onStar={(id) => handleStarToggle(selectedJob, null)}
                            onUnstar={(id) => handleStarToggle(selectedJob, null)}
                        />
                    )}
                </div>
            );
        }

        // --- GLOBAL ROOT PAGE RENDER ---
        function App() {
            return (
                <div className="min-h-screen pb-12 flex flex-col justify-between">
                    <div>
                        {/* Global Navigation Bar */}
                        <header className="glass-card sticky top-0 z-40 border-b border-slate-800/60 mb-8">
                            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="h-9 w-9 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/35">
                                        <span className="font-extrabold text-white text-base tracking-wider">A</span>
                                    </div>
                                    <span className="font-extrabold text-white text-lg tracking-wider">APTSO</span>
                                </div>
                                <span className="text-[10px] font-bold tracking-widest text-slate-500 uppercase px-3 py-1 bg-slate-900 border border-slate-850 rounded-xl">
                                    CANDIDATE VIEW
                                </span>
                            </div>
                        </header>

                        {/* Main Body */}
                        <main className="px-6">
                            <CandidateDashboard />
                        </main>
                    </div>

                    {/* Footer Accent */}
                    <footer className="text-center text-xs text-slate-600 mt-16 max-w-7xl mx-auto px-6 pt-6 border-t border-slate-900">
                        <p>© 2026 APTSO Job Aggregation Platform. All rights reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
