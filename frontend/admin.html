<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APTSO - Admin Dashboard</title>
    <!-- Tailwind and Outfit Google Font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'fade-in': 'fadeIn 0.4s ease-out forwards',
                        'slide-in': 'slideIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateX(100%)' },
                            '100%': { transform: 'translateX(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617; /* slate-950 */
            color: #f8fafc; /* slate-50 */
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
        /* Glassmorphism utility */
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glass-panel {
            background: rgba(8, 13, 24, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glow-accent {
            box-shadow: 0 0 40px -15px rgba(124, 58, 237, 0.15);
        }
    </style>
</head>
<body class="overflow-x-hidden min-h-screen relative antialiased selection:bg-purple-600 selection:text-white">
    
    <!-- Ambient Blur Background Elements -->
    <div class="absolute top-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-purple-600/5 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-cyan-600/5 blur-[120px] pointer-events-none"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const API_URL = "http://127.0.0.1:8000";

        // --- REAL API LAYER WITH AUTO-LOGIN ---
        const api = {
            login: async () => {
                const formData = new FormData();
                formData.append("username", "admin");
                formData.append("password", "password");
                const response = await fetch(`${API_URL}/token`, {
                    method: "POST",
                    body: formData,
                });
                if (!response.ok) throw new Error("Authentication failed");
                const data = await response.json();
                localStorage.setItem("admin_token", data.access_token);
                return data.access_token;
            },

            getToken: async () => {
                let token = localStorage.getItem("admin_token");
                if (!token) {
                    token = await api.login();
                }
                return token;
            },

            getAdminJobs: async (searchTerm = '') => {
                let token = await api.getToken();
                const makeRequest = async (authTok) => {
                    return fetch(`${API_URL}/admin/jobs?search=${encodeURIComponent(searchTerm)}`, {
                        headers: { 'Authorization': `Bearer ${authTok}` }
                    });
                };
                
                let res = await makeRequest(token);
                if (res.status === 401) {
                    const freshToken = await api.login();
                    res = await makeRequest(freshToken);
                }
                if (!res.ok) throw new Error("Failed to fetch admin jobs");
                return res.json();
            },

            getAdminStarredJobs: async () => {
                let token = await api.getToken();
                const makeRequest = async (authTok) => {
                    return fetch(`${API_URL}/admin/starred-jobs`, {
                        headers: { 'Authorization': `Bearer ${authTok}` }
                    });
                };

                let res = await makeRequest(token);
                if (res.status === 401) {
                    const freshToken = await api.login();
                    res = await makeRequest(freshToken);
                }
                if (!res.ok) throw new Error("Failed to fetch starred jobs");
                return res.json();
            },

            analyzeJobWithGemini: async (job, userApiKey = "") => {
                const apiKey = userApiKey || localStorage.getItem("gemini_api_key");
                
                // If there's no API key supplied, we run a gorgeous intelligent simulated AI analysis!
                if (!apiKey) {
                    await new Promise(resolve => setTimeout(resolve, 1500)); // Simulate AI thinking
                    
                    // Generate clean, highly professional mock responses based on job parameters
                    const skillsMap = {
                        "engineer": ["React", "Python", "Docker", "Git", "REST APIs", "AWS"],
                        "developer": ["JavaScript", "React", "Node.js", "MongoDB", "CSS Grid", "Git"],
                        "analyst": ["SQL", "Excel", "Tableau", "Python", "Data Governance", "Statistics"],
                        "designer": ["Figma", "UI/UX", "Wireframing", "Typography", "Prototyping", "Design Systems"],
                        "manager": ["Agile", "Scrum", "Product Roadmap", "Stakeholder Management", "Jira", "Leadership"],
                        "accountant": ["Excel", "QuickBooks", "Tax Compliance", "Financial Auditing", "Bookkeeping", "Tally"],
                        "writer": ["SEO Writing", "Copywriting", "Content Strategy", "Proofreading", "Editing", "CMS Platforms"]
                    };
                    
                    const titleLower = job.title.toLowerCase();
                    let selectedSkills = ["Problem Solving", "Team Collaboration", "Analytical Thinking", "Communication", "Time Management"];
                    
                    for (const [key, list] of Object.entries(skillsMap)) {
                        if (titleLower.includes(key)) {
                            selectedSkills = list;
                            break;
                        }
                    }

                    return {
                        summary: `A critical, highly collaborative role at ${job.company} located in ${job.location}. The position demands robust proficiency in the field, working alongside cross-functional team structures to drive regional growth. Key objectives include executing requirements, optimizing workflows, and contributing to strategic deliverables.`,
                        skills: selectedSkills,
                        salaryEstimate: job.salary || "₹4,50,000 - ₹8,00,000 / year",
                        matchScore: 88
                    };
                }

                // If they did provide an API key, we run the ACTUAL Google Gemini API!
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
                
                const prompt = `Based on the following job description, provide a JSON object with four keys:
                1. "summary": A concise one-paragraph summary of the role.
                2. "skills": An array of the top 5-7 most important skills or technologies mentioned.
                3. "salaryEstimate": An estimated market salary range if not mentioned (e.g. ₹5,00,000 - ₹9,00,000 / year).
                4. "matchScore": A mock fit matching percentage (integer between 60 and 100) for a standard candidate.

                Job Details:
                Title: ${job.title}
                Company: ${job.company}
                Location: ${job.location}
                Description: ${job.description || "No description provided."}`;

                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        responseMimeType: "application/json",
                    }
                };

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Google API call failed with status: ${response.status}`);
                }

                const result = await response.json();
                const text = result.candidates[0].content.parts[0].text;
                return JSON.parse(text);
            }
        };

        // --- ICONS ---
        const SearchIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        );

        const StarIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-yellow-500 fill-yellow-500 mr-2 drop-shadow-[0_0_5px_rgba(234,179,8,0.3)]" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        );

        const KeyIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-violet-400 mr-1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
        );

        const SparklesIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2 inline" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10z"></path></svg>
        );

        const UserIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-slate-400 mr-2" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        );

        const CloseIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-slate-400 hover:text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );

        // --- JOB ANALYSIS PANEL ---
        function JobAnalysisModal({ job, onClose, savedApiKey }) {
            const [analysis, setAnalysis] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const runAnalysis = async () => {
                setLoading(true);
                setError(null);
                try {
                    const data = await api.analyzeJobWithGemini(job, savedApiKey);
                    setAnalysis(data);
                } catch (err) {
                    console.error("Gemini API error:", err);
                    setError("Google AI Gateway error. Please check your API key validity.");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (job) {
                    setAnalysis(null);
                    setError(null);
                }
            }, [job]);

            if (!job) return null;

            return (
                <div className="fixed inset-0 z-50 flex justify-end" style={{ backgroundColor: 'rgba(2, 6, 23, 0.65)', backdropFilter: 'blur(4px)' }} onClick={onClose}>
                    <div 
                        className="w-full max-w-xl h-full glass-panel shadow-2xl flex flex-col relative animate-slide-in overflow-y-auto"
                        onClick={e => e.stopPropagation()}
                    >
                        {/* Header */}
                        <div className="p-6 border-b border-slate-800/80 flex justify-between items-start">
                            <div>
                                <span className="inline-block text-[10px] font-bold px-2 py-0.5 rounded-full border border-violet-500/30 bg-violet-500/10 text-violet-400 tracking-wider uppercase mb-2">
                                    AI INTELLIGENCE GATEWAY
                                </span>
                                <h2 className="text-xl font-bold text-white leading-tight">{job.title}</h2>
                                <p className="text-sm text-slate-400 mt-1">{job.company} • {job.location}</p>
                            </div>
                            <button onClick={onClose} className="p-2 bg-slate-900/80 border border-slate-800 rounded-xl hover:bg-slate-800 hover:border-slate-700 transition-colors">
                                <CloseIcon />
                            </button>
                        </div>

                        {/* Body */}
                        <div className="p-6 space-y-6 flex-grow">
                            {/* Raw Description Section */}
                            <div className="space-y-2">
                                <h3 className="text-sm font-semibold text-slate-400">Raw Description</h3>
                                <div className="text-xs text-slate-300 bg-slate-950/60 p-4 rounded-xl border border-slate-850 max-h-36 overflow-y-auto whitespace-pre-line">
                                    {job.description || "No full job description supplied."}
                                </div>
                            </div>

                            <hr className="border-slate-800/60" />

                            {/* Analysis Panel */}
                            <div className="space-y-4">
                                <div className="flex justify-between items-center">
                                    <h3 className="text-md font-bold text-white flex items-center">
                                        <span className="text-violet-400 font-bold">✨</span> AI Insights Summary
                                    </h3>
                                    {!analysis && !loading && (
                                        <button 
                                            onClick={runAnalysis}
                                            className="px-4 py-2 bg-gradient-to-r from-violet-600 to-indigo-600 hover:from-violet-700 hover:to-indigo-700 text-white font-semibold rounded-xl text-xs shadow-md transition-all duration-300"
                                        >
                                            Generate Analysis
                                        </button>
                                    )}
                                </div>

                                {loading && (
                                    <div className="p-12 text-center space-y-3">
                                        <div className="w-8 h-8 border-4 border-violet-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                                        <p className="text-slate-400 text-xs animate-pulse">Consulting Gemini 1.5 Flash API...</p>
                                    </div>
                                )}

                                {error && (
                                    <div className="p-4 bg-rose-950/30 border border-rose-500/20 text-rose-300 text-xs rounded-xl">
                                        {error}
                                    </div>
                                )}

                                {analysis && (
                                    <div className="space-y-5 animate-fade-in">
                                        {/* Score and Salary */}
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="p-4 bg-slate-950/50 border border-slate-800/50 rounded-xl">
                                                <p className="text-xs text-slate-500">Candidate Match Score</p>
                                                <p className="text-xl font-bold text-violet-400 mt-1">{analysis.matchScore}%</p>
                                            </div>
                                            <div className="p-4 bg-slate-950/50 border border-slate-800/50 rounded-xl">
                                                <p className="text-xs text-slate-500">AI Estimated Salary</p>
                                                <p className="text-sm font-bold text-emerald-400 mt-1">{analysis.salaryEstimate}</p>
                                            </div>
                                        </div>

                                        {/* Summary text */}
                                        <div className="space-y-1 bg-violet-500/5 border border-violet-500/10 p-4 rounded-xl">
                                            <p className="text-xs text-violet-300 font-bold uppercase tracking-wide">Summary</p>
                                            <p className="text-slate-300 text-xs leading-relaxed">{analysis.summary}</p>
                                        </div>

                                        {/* Skills tags */}
                                        <div className="space-y-2">
                                            <p className="text-xs text-slate-400 font-semibold">Key Qualifications & Skills Required</p>
                                            <div className="flex flex-wrap gap-2">
                                                {analysis.skills.map(skill => (
                                                    <span 
                                                        key={skill} 
                                                        className="bg-indigo-500/10 text-indigo-300 border border-indigo-500/20 text-xs font-semibold px-3 py-1 rounded-full"
                                                    >
                                                        {skill}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="p-6 border-t border-slate-800/80 bg-slate-950/80 sticky bottom-0 flex justify-between items-center text-xs text-slate-500">
                            <span>Powered by Google Gemini AI Model</span>
                            <a 
                                href={job.url} 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="px-4 py-2 border border-slate-800 hover:bg-slate-900 rounded-lg text-slate-300 text-center transition-all"
                            >
                                View Job Posting Page
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        // --- TOASTS ---
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);

            const bgColors = {
                success: "bg-emerald-950/90 text-emerald-300 border-emerald-500/40",
                error: "bg-rose-950/90 text-rose-300 border-rose-500/40",
                info: "bg-indigo-950/90 text-indigo-300 border-indigo-500/40"
            };

            return (
                <div className={`fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl border flex items-center shadow-2xl backdrop-blur-md animate-fade-in ${bgColors[type] || bgColors.info}`}>
                    <span className="font-medium text-sm">{message}</span>
                </div>
            );
        }

        // --- DASHBOARD RENDER ---
        function AdminDashboard() {
            const [jobs, setJobs] = useState([]);
            const [starredJobs, setStarredJobs] = useState([]);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedJob, setSelectedJob] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [secureSession, setSecureSession] = useState(false);
            const [toast, setToast] = useState(null);

            // API key configurations
            const [apiKeyInput, setApiKeyInput] = useState("");
            const [savedApiKey, setSavedApiKey] = useState("");
            const [showApiKeySetting, setShowApiKeySetting] = useState(false);

            const showToast = useCallback((message, type = 'info') => {
                setToast({ message, type });
            }, []);

            const fetchData = async (search = searchTerm) => {
                setLoading(true);
                setError(null);
                try {
                    const jobsData = await api.getAdminJobs(search);
                    const starredData = await api.getAdminStarredJobs();
                    setJobs(jobsData);
                    setStarredJobs(starredData);
                    setSecureSession(true);
                } catch (err) {
                    console.error("Failed to load admin dashboard data:", err);
                    setError("Could not load data. Ensure backend is running and listening on port 8000.");
                    setSecureSession(false);
                } finally {
                    setLoading(false);
                }
            };

            // Initial Mount Data Load
            useEffect(() => {
                const init = async () => {
                    try {
                        await api.getToken();
                        setSecureSession(true);
                        await fetchData("");
                    } catch (e) {
                        console.error("Auth error:", e);
                        showToast("Connection to admin endpoints failed.", "error");
                    }
                };
                init();

                // Load API key from LocalStorage
                const savedKey = localStorage.getItem("gemini_api_key") || "";
                setSavedApiKey(savedKey);
                setApiKeyInput(savedKey ? "••••••••••••••••••••••••" : "");
            }, []);

            const handleApiKeySave = (e) => {
                e.preventDefault();
                if (!apiKeyInput.trim() || apiKeyInput.includes("••••")) {
                    // Do nothing if it's the bullet placeholders
                    showToast("API Key remains unchanged", "info");
                } else {
                    localStorage.setItem("gemini_api_key", apiKeyInput);
                    setSavedApiKey(apiKeyInput);
                    showToast("Gemini API key saved securely!", "success");
                }
                setShowApiKeySetting(false);
            };

            const handleApiKeyClear = () => {
                localStorage.removeItem("gemini_api_key");
                setSavedApiKey("");
                setApiKeyInput("");
                showToast("Custom API key cleared. Using simulated analyzer.", "info");
                setShowApiKeySetting(false);
            };

            const handleSearchSubmit = (e) => {
                if (e) e.preventDefault();
                fetchData(searchTerm);
            };

            return (
                <div className="space-y-8 max-w-7xl mx-auto">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    <JobAnalysisModal 
                        job={selectedJob} 
                        onClose={() => setSelectedJob(null)} 
                        savedApiKey={savedApiKey}
                    />

                    {/* Stats Panel & System Overview */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-900/20 p-6 rounded-3xl border border-slate-800/40">
                        <div className="p-4 bg-slate-950/40 border border-slate-850 rounded-2xl">
                            <p className="text-xs text-slate-500">Total Jobs Ingestion</p>
                            <p className="text-2xl font-bold text-white mt-1">{jobs.length}</p>
                            <span className="text-[10px] text-indigo-400 font-semibold uppercase mt-1 inline-block">Active Index</span>
                        </div>
                        <div className="p-4 bg-slate-950/40 border border-slate-850 rounded-2xl">
                            <p className="text-xs text-slate-500">Starred by Candidates</p>
                            <p className="text-2xl font-bold text-violet-400 mt-1">{starredJobs.length}</p>
                            <span className="text-[10px] text-violet-400 font-semibold uppercase mt-1 inline-block">Interest Gauge</span>
                        </div>
                        <div className="p-4 bg-slate-950/40 border border-slate-850 rounded-2xl">
                            <p className="text-xs text-slate-500">Active Aggregators</p>
                            <div className="flex flex-wrap gap-1.5 mt-2">
                                <span className="px-2 py-0.5 bg-orange-500/10 text-orange-400 border border-orange-500/25 rounded-md text-[9px] font-bold">REMOTIVE</span>
                                <span className="px-2 py-0.5 bg-cyan-500/10 text-cyan-400 border border-cyan-500/25 rounded-md text-[9px] font-bold">ADZUNA</span>
                                <span className="px-2 py-0.5 bg-emerald-500/10 text-emerald-400 border border-emerald-500/25 rounded-md text-[9px] font-bold">JSEARCH</span>
                            </div>
                        </div>
                        <div className="p-4 bg-slate-950/40 border border-slate-850 rounded-2xl flex flex-col justify-between">
                            <div className="flex justify-between items-start">
                                <p className="text-xs text-slate-500">AI Analyzer Engine</p>
                                <span className="flex h-2 w-2 relative">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-violet-400 opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-2 w-2 bg-violet-500"></span>
                                </span>
                            </div>
                            <div className="flex justify-between items-center mt-1">
                                <p className="text-xs font-bold text-white">
                                    {savedApiKey ? "Gemini Real API" : "Simulated Gemini"}
                                </p>
                                <button 
                                    onClick={() => setShowApiKeySetting(!showApiKeySetting)}
                                    className="text-[10px] font-semibold text-violet-400 hover:underline hover:text-white"
                                >
                                    {showApiKeySetting ? "Close" : "Configure"}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* API Key Modal Panel */}
                    {showApiKeySetting && (
                        <form onSubmit={handleApiKeySave} className="bg-slate-900/60 p-5 rounded-2xl border border-violet-500/20 max-w-xl mx-auto space-y-4 animate-fade-in">
                            <div className="flex items-center gap-2 text-white font-bold text-sm">
                                <KeyIcon />
                                <h4>Google AI Studio API Key Configuration</h4>
                            </div>
                            <p className="text-xs text-slate-400 leading-normal">
                                Provide your Google Gemini API key to query the real <b>Gemini 1.5 Flash</b> model on-demand. 
                                Leave blank to run APTSO's premium high-fidelity local simulation engine.
                            </p>
                            <div className="flex gap-2">
                                <input 
                                    type="password"
                                    value={apiKeyInput}
                                    onChange={(e) => setApiKeyInput(e.target.value)}
                                    placeholder="Enter your AI Studio API key (AIzaSy...)"
                                    className="flex-grow bg-slate-950 border border-slate-800 px-4 py-2.5 rounded-xl text-xs text-white focus:outline-none focus:ring-1 focus:ring-violet-500"
                                />
                                <button 
                                    type="submit"
                                    className="px-4 py-2.5 bg-violet-600 hover:bg-violet-700 text-white font-semibold rounded-xl text-xs"
                                >
                                    Save Key
                                </button>
                                {savedApiKey && (
                                    <button 
                                        type="button"
                                        onClick={handleApiKeyClear}
                                        className="px-3 py-2.5 bg-slate-800 hover:bg-rose-950/40 text-slate-400 hover:text-rose-400 border border-slate-700 rounded-xl text-xs"
                                    >
                                        Clear
                                    </button>
                                )}
                            </div>
                        </form>
                    )}

                    {/* Search and Action Row */}
                    <form onSubmit={handleSearchSubmit} className="flex gap-4">
                        <div className="flex-grow relative">
                            <input
                                type="text"
                                placeholder="Filter ingested jobs by title, company or desc..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full bg-slate-900/40 border border-slate-800/80 hover:border-slate-700 text-slate-200 placeholder-slate-500 px-4 py-3.5 pl-11 rounded-xl focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all text-sm"
                            />
                            <div className="absolute left-4 top-4">
                                <SearchIcon />
                            </div>
                        </div>
                        <button
                            type="submit"
                            className="px-6 py-3.5 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-xl text-sm transition-all duration-300"
                        >
                            Filter Index
                        </button>
                    </form>

                    {error && (
                        <div className="bg-rose-950/30 border border-rose-500/20 text-rose-300 px-4 py-3 rounded-xl text-xs" role="alert">
                            {error}
                        </div>
                    )}

                    {/* Main Layout Grid */}
                    {loading ? (
                        <div className="p-24 text-center">
                            <div className="w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
                            <p className="text-slate-500 text-xs">Ingesting platform databases...</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            
                            {/* Ingested Jobs Column */}
                            <div className="lg:col-span-2 space-y-4">
                                <h2 className="text-lg font-bold text-white border-l-4 border-purple-500 pl-2">
                                    Ingested Job Index ({jobs.length})
                                </h2>
                                <div className="grid gap-4 sm:grid-cols-2">
                                    {jobs.map((job) => (
                                        <div 
                                            key={job._id} 
                                            className="glass-card rounded-2xl p-5 border border-slate-800/80 flex flex-col justify-between hover:border-purple-500/30 hover:-translate-y-0.5 transition-all duration-300 group glow-accent"
                                        >
                                            <div>
                                                <span className="inline-block text-[9px] font-bold px-2 py-0.5 rounded-full border border-slate-800 bg-slate-950/60 text-slate-400 uppercase tracking-wider mb-2">
                                                    {job.source || "aggregator"}
                                                </span>
                                                <h3 className="font-bold text-white group-hover:text-purple-400 transition-colors leading-snug line-clamp-1">{job.title}</h3>
                                                <p className="text-xs text-purple-300 font-semibold mt-0.5">{job.company}</p>
                                                <p className="text-[10px] text-slate-500 mt-1">{job.location}</p>
                                            </div>
                                            
                                            <div className="mt-4 flex items-center gap-2 pt-3.5 border-t border-slate-900/60">
                                                <button
                                                    className="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white py-2 rounded-xl text-xs font-bold shadow-md shadow-purple-950/20 flex items-center justify-center gap-1.5 transition-all"
                                                    onClick={() => setSelectedJob(job)}
                                                >
                                                    <SparklesIcon /> Analyze Job
                                                </button>
                                                <a
                                                    href={job.url}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="flex-1 bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 py-2 rounded-xl text-xs font-semibold text-center transition-all"
                                                >
                                                    View Post
                                                </a>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Candidate Starred Panel */}
                            <div className="space-y-4">
                                <h2 className="text-lg font-bold text-white border-l-4 border-yellow-500 pl-2">
                                    Candidate Stars ({starredJobs.length})
                                </h2>
                                <div className="space-y-3">
                                    {starredJobs.length > 0 ? (
                                        starredJobs.map((item, idx) => (
                                            <div 
                                                key={idx} 
                                                onClick={() => setSelectedJob(item.job)}
                                                className="glass-card p-4 rounded-xl border border-slate-800/80 flex items-center justify-between cursor-pointer hover:border-yellow-500/30 hover:bg-slate-900/30 transition-all duration-300"
                                            >
                                                <div className="pr-4">
                                                    <h3 className="font-bold text-slate-200 text-xs leading-snug line-clamp-1">{item.job.title}</h3>
                                                    <p className="text-[10px] text-purple-300 font-semibold mt-0.5">{item.job.company}</p>
                                                    <div className="flex items-center gap-1 mt-1 text-[9px] text-slate-500">
                                                        <UserIcon />
                                                        <span>{item.user}</span>
                                                    </div>
                                                </div>
                                                <StarIcon />
                                            </div>
                                        ))
                                    ) : (
                                        <div className="glass-card p-8 rounded-2xl text-center border border-slate-800/40 text-slate-500 text-xs">
                                            No active candidate stars cataloged yet.
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- GLOBAL ROOT PAGE RENDER ---
        function App() {
            return (
                <div className="min-h-screen pb-12 flex flex-col justify-between">
                    <div>
                        {/* Global Navigation Bar */}
                        <header className="glass-card sticky top-0 z-40 border-b border-slate-800/60 mb-8">
                            <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="h-9 w-9 bg-gradient-to-tr from-purple-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-500/35">
                                        <span className="font-extrabold text-white text-base tracking-wider">A</span>
                                    </div>
                                    <span className="font-extrabold text-white text-lg tracking-wider">APTSO</span>
                                </div>
                                <span className="text-[10px] font-bold tracking-widest text-slate-400 bg-purple-950/40 border border-purple-500/20 px-3 py-1 rounded-xl">
                                    ADMIN DASHBOARD
                                </span>
                            </div>
                        </header>

                        {/* Main Body */}
                        <main className="px-6">
                            <AdminDashboard />
                        </main>
                    </div>

                    {/* Footer Accent */}
                    <footer className="text-center text-xs text-slate-600 mt-16 max-w-7xl mx-auto px-6 pt-6 border-t border-slate-900">
                        <p>© 2026 APTSO Job Aggregation Platform. All rights reserved.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
